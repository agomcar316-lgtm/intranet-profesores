<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Intranet Profesorado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</head>
<body>

  <div id="bloqueo">
    <div class="caja-login">
      <h2>Intranet IES</h2>
      <p style="color: #666; font-size: 14px;">Inicia sesión con tu usuario de Educaand</p>
      
      <input type="text" id="userInput" placeholder="Ej: acervel346">
      <input type="password" id="passInput" placeholder="Contraseña">
      <button onclick="iniciarSesion()">Acceder</button>
      
      <div id="error" class="error-msg">Usuario o contraseña incorrectos, o no estás en la lista autorizada.</div>
    </div>
  </div>

  <div id="app">Cargando intranet...</div>

  <script>
    // --- PEGA AQUÍ TUS DATOS DE SUPABASE DEL PASO 1 ---
    const SUPABASE_URL = "https://ailzwulxwbzckqobwkxa.supabase.co";
    const SUPABASE_KEY = "sb_publishable_43E5b_XAdcJqG8PjEGfklQ_lDNFBiqN";
    // --------------------------------------------------

    miSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function iniciarSesion() {
      let usuario = document.getElementById('userInput').value.trim();
      const contrasena = document.getElementById('passInput').value;
      const errorDiv = document.getElementById('error');

      if (usuario.includes('@')) {
        usuario = usuario.split('@')[0];
      }
      usuario = usuario + "@g.educaand.es";

      // Intentamos loguear al usuario contra tu lista de Supabase
      const { data, error } = await miSupabase.auth.signInWithPassword({
        email: usuario,
        password: contrasena,
      });

      if (error) {
        errorDiv.textContent = "Acceso denegado: Usuario no válido o no autorizado.";
        errorDiv.style.display = 'block';
      } else {
        // Logueado con éxito
        sessionStorage.setItem('sesion_docente', 'activa');
        document.getElementById('bloqueo').style.display = 'none';
      }
    }

    // Comprobar si el profesor ya estaba dentro
    window.onload = function () {
      if (sessionStorage.getItem('sesion_docente') === 'activa') {
        document.getElementById('bloqueo').style.display = 'none';
      }
    }

    // Configuración de Docsify
    window.$docsify = {
  name: 'IES Drago',
  // Cambia la ruta por la de tu logo real cuando lo subas a GitHub
  logo: 'logo.png', 
  themeColor: '#4A90E2', // El código hexadecimal para un azul clarito muy elegante
  loadSidebar: true,
  auto2top: true
};
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

<style>
<style>
  /* 1. CONFIGURACIÓN DE COLORES GENERALES */
  /* Fondo de toda la página en Azul Clarito */
  body, section.content, article {
    background-color: #EBF3FC !important; 
  }
  
  /* Columna del menú lateral en Blanco */
  .sidebar {
    background-color: #ffffff !important;
    border-right: 1px solid #cbd5e1;
  }
  
  /* Enlaces del menú lateral */
  .sidebar ul li a {
    color: #334155 !important;
    font-size: 14px;
  }
  .sidebar ul li.active > a, 
  .sidebar ul li a:hover {
    color: #4A90E2 !important; 
    font-weight: bold;
    background-color: #f1f5f9;
  }

  /* 2. DISEÑO MÓVIL (Botón para ocultar/mostrar menú) */
  .sidebar-toggle {
    background-color: rgba(255, 255, 255, 0.9) !important;
    border-radius: 4px;
    padding: 10px !important;
    bottom: auto !important;
    top: 10px !important;
  }

  /* 3. PANTALLA DE BLOQUEO (Login) */
  /* Fondo completo en Azul Marino */
  #bloqueo {
    background-color: #0F172A !important; 
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* Cuadro del formulario en Blanco */
  #login-box {
    background-color: #ffffff !important;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    width: 90%;
    max-width: 400px;
    text-align: center;
  }
  
  /* Inputs y botón del login */
  #login-box h2 { color: #0F172A !important; font-family: sans-serif; }
  #login-box input[type="text"], #login-box input[type="password"] {
    width: 100%; padding: 12px; margin: 10px 0;
    border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;
  }
  #login-box input[type="button"] {
    width: 100%; padding: 12px; background-color: #4A90E2 !important;
    color: white !important; border: none; border-radius: 6px;
    font-weight: bold; cursor: pointer; margin-top: 10px;
  }

  /* 4. ADAPTACIÓN DEL CALENDARIO NO-GOOGLE EN MÓVILES */
  .contenedor-calendario {
    position: relative;
    width: 100%;
    overflow: hidden;
    padding-top: 75%; /* Relación de aspecto para que no se corte en el móvil */
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  .contenedor-calendario iframe {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: 0;
  }
</style>
</style>

</body>
</html>
</body>
</html>
