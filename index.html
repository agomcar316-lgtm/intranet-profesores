<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Intranet IES Drago</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>

  <div id="bloqueo">
    <div class="login-box-container">
      <img src="logo.png" class="login-logo" alt="IES Drago">
      <h2>Intranet IES Drago</h2>
      <p>Inicia sesión con tu usuario de Educaand</p>
      
      <input type="text" id="userInput" placeholder="Usuario de Séneca">
      <input type="password" id="passInput" placeholder="Contraseña">
      
      <button onclick="iniciarSesion()">Acceder</button>
      <div id="error" style="color: red; display: none; margin-top: 15px; font-weight: bold;"></div>
    </div>
  </div>

  <div id="app">Cargando la intranet...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // --- DATOS DE CONEXIÓN A SUPABASE ---
    const SUPABASE_URL = "https://ailzculxwbzckqobwlxa.supabase.co";
    // Usamos tu clave pública real "anon public" para que la conexión responda
    const SUPABASE_KEY = "sb_publishable_GO_oH1MciSTQNL8llaUpbA_mu29fjKR"; 
    
    // Inicialización del cliente
    const miSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // FUNCIÓN DE LOGUEO
    async function iniciarSesion() {
      let usuario = document.getElementById('userInput').value.trim();
      const contrasena = document.getElementById('passInput').value;
      const errorDiv = document.getElementById('error');

      if (!usuario || !contrasena) {
        errorDiv.textContent = "Por favor, rellena todos los campos.";
        errorDiv.style.display = 'block';
        return;
      }

      if (usuario.includes('@')) {
        usuario = usuario.split('@')[0];
      }
      usuario = usuario + "@g.educaand.es";

      try {
        const { data, error } = await miSupabase.auth.signInWithPassword({
          email: usuario,
          password: contrasena,
        });

        if (error) {
          errorDiv.textContent = "Acceso denegado: Datos incorrectos.";
          errorDiv.style.display = 'block';
        } else {
          sessionStorage.setItem('sesion_docente', 'activa');
          document.getElementById('bloqueo').style.display = 'none';
        }
      } catch (err) {
        errorDiv.textContent = "Error de comunicación con Supabase.";
        errorDiv.style.display = 'block';
      }
    }

    // Persistencia de la sesión al recargar
    window.onload = function() {
      if (sessionStorage.getItem('sesion_docente') === 'activa') {
        document.getElementById('bloqueo').style.display = 'none';
      }
    }

    // CONFIGURACIÓN INTERNA DE DOCSIFY
    window.$docsify = {
      name: 'IES Drago',
      logo: 'logo.png',
      themeColor: '#4A90E2',
      loadSidebar: true,
      auto2top: true
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <style>
    /* Bloqueo: Fondo Azul Marino Oscuro */
    #bloqueo {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #0F172A !important; 
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    /* Caja Flotante Blanca */
    .login-box-container {
      background-color: #ffffff !important;
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-sizing: border-box;
    }

    .login-box-container .login-logo {
      max-width: 130px;
      height: auto;
      margin: 0 auto 20px auto;
      display: block;
    }

    .login-box-container h2 {
      color: #1E293B !important;
      margin-bottom: 8px;
      font-size: 22px;
      font-family: system-ui, sans-serif;
    }

    .login-box-container p {
      color: #64748B !important;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .login-box-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #CBD5E1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
      background-color: #F8FAFC;
    }

    .login-box-container button {
      width: 100%;
      padding: 13px;
      background-color: #4A90E2 !important;
      color: white !important;
      border: none !important;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .login-box-container button:hover {
      background-color: #2563EB !important;
    }

    /* DISEÑO INTERIOR DE LA WEB: FONDO AZUL CLARITO */
    body, .content, article {
      background-color: #EBF3FC !important; 
    }

    /* COLUMNA LATERAL EN BLANCO ENVIDIABLE */
    .sidebar {
      background-color: #FFFFFF !important;
      border-right: 1px solid #E2E8F0;
    }

    .sidebar ul li a {
      color: #334155 !important;
      font-size: 14px;
    }

    .sidebar ul li.active > a, 
    .sidebar ul li a:hover {
      color: #4A90E2 !important;
      font-weight: bold;
      background-color: #F1F5F9;
      border-left: 4px solid #4A90E2;
    }

    .sidebar ul li ul {
      padding-left: 15px !important;
    }

    .contenedor-calendario-adaptable {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding-top: 80%; 
      background: white;
      border-radius: 8px;
    }
    .contenedor-calendario-adaptable iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }
  </style>

</body>
</html>
